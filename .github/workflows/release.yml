name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake (MSVC static CRT)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifact -Force
          Copy-Item build/Release/llm-gateway.exe artifact/
          Copy-Item src/webui artifact/webui -Recurse

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-gateway-windows
          path: artifact/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake (static)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DSTATIC_BUILD=ON

      - name: Build
        run: cmake --build build

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          cp build/llm-gateway artifact/
          cp -r src/webui artifact/webui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-gateway-linux
          path: artifact/

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Package Windows
        run: |
          cd llm-gateway-windows
          zip -r ../llm-gateway-windows.zip .

      - name: Package Linux
        run: |
          cd llm-gateway-linux
          tar -czf ../llm-gateway-linux.tar.gz .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            llm-gateway-windows.zip
            llm-gateway-linux.tar.gz
